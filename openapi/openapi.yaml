openapi: 3.1.0
info:
  title: Urban Energy Usage & Sustainability Advisory Service API
  version: 1.0.0
  description: >
    OpenAPI specification derived from GW1 JSON schemas.
    Covers energy assessment submission and sustainability report generation.

servers:
  - url: https://api.example.com

paths:
  /assessments:
    post:
      tags: [Assessments]
      summary: submitEnergyAssessment
      operationId: submitEnergyAssessment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitEnergyAssessmentRequest'
      responses:
        '201':
          description: Energy assessment created successfully
          headers:
            Location:
              description: URL of the created assessment resource
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitEnergyAssessmentResponse'
        '400':
          description: Invalid request payload
        '500':
          description: Internal server error

  /assessments/{assessmentId}:
    get:
      tags: [Assessments]
      summary: Retrieve assessment result
      operationId: getAssessment
      parameters:
        - name: assessmentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Assessment retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitEnergyAssessmentResponse'
        '404':
          description: Assessment not found

  /reports:
    post:
      tags: [Reports]
      summary: generateSustainabilityReport
      operationId: generateSustainabilityReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateSustainabilityReportRequest'
      responses:
        '201':
          description: Sustainability report created successfully
          headers:
            Location:
              description: URL of the created report resource
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateSustainabilityReportResponse'
        '400':
          description: Invalid request payload
        '500':
          description: Internal server error

  /reports/{reportId}:
    get:
      tags: [Reports]
      summary: Retrieve generated report
      operationId: getReport
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Report retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateSustainabilityReportResponse'
        '404':
          description: Report not found

components:
  schemas:

    SubmitEnergyAssessmentRequest:
      type: object
      additionalProperties: false
      required: [requestId, createdAt, property, timeWindow]
      properties:
        requestId:
          type: string
        createdAt:
          type: string
          format: date-time
        property:
          $ref: '#/components/schemas/Property'
        timeWindow:
          $ref: '#/components/schemas/TimeWindow'

    Property:
      type: object
      additionalProperties: false
      required: [propertyId, location, propertyType]
      properties:
        propertyId:
          type: string
        location:
          type: string
        propertyType:
          type: string
          enum: [home, smallBuilding]

    TimeWindow:
      type: object
      additionalProperties: false
      required: [startDateTime, endDateTime, granularity]
      properties:
        startDateTime:
          type: string
          format: date-time
        endDateTime:
          type: string
          format: date-time
        granularity:
          type: string
          enum: [hourly, daily]

    SubmitEnergyAssessmentResponse:
      type: object
      additionalProperties: false
      required: [assessmentId, startedAt, assessmentStatus]
      properties:
        assessmentId:
          type: string
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: [string, 'null']
          format: date-time
        assessmentStatus:
          type: string
          enum: [Pending, Completed, Partial, Failed]
        energyConsumptionData:
          $ref: '#/components/schemas/EnergyConsumptionData'
        weatherContextData:
          $ref: '#/components/schemas/WeatherContextData'
        carbonIntensityData:
          $ref: '#/components/schemas/CarbonIntensityData'
        errorMessage:
          type: string

    EnergyConsumptionData:
      type: object
      additionalProperties: false
      required: [sourceName, dataFrom, dataTo]
      properties:
        sourceName:
          type: string
        dataFrom:
          type: string
          format: date-time
        dataTo:
          type: string
          format: date-time

    WeatherContextData:
      type: object
      additionalProperties: false
      required: [sourceName, dataFrom, dataTo]
      properties:
        sourceName:
          type: string
        dataFrom:
          type: string
          format: date-time
        dataTo:
          type: string
          format: date-time

    CarbonIntensityData:
      type: object
      additionalProperties: false
      required: [sourceName, region, dataFrom, dataTo]
      properties:
        sourceName:
          type: string
        region:
          type: string
        dataFrom:
          type: string
          format: date-time
        dataTo:
          type: string
          format: date-time

    GenerateSustainabilityReportRequest:
      type: object
      additionalProperties: false
      required: [assessmentId, assessmentStatus, completedAt]
      properties:
        assessmentId:
          type: string
        assessmentStatus:
          type: string
          enum: [Completed, Partial, Failed]
        completedAt:
          type: string
          format: date-time

    GenerateSustainabilityReportResponse:
      type: object
      additionalProperties: false
      required: [reportId, generatedAt, reportVersion, summaryMetrics, recommendations]
      properties:
        reportId:
          type: string
        generatedAt:
          type: string
          format: date-time
        reportVersion:
          type: string
        summaryMetrics:
          $ref: '#/components/schemas/ReportSummaryMetrics'
        recommendations:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Recommendation'
        contextNotes:
          type: array
          items:
            $ref: '#/components/schemas/ContextNote'
        dataCompletenessNotes:
          type: array
          items:
            $ref: '#/components/schemas/DataCompletenessNote'

    ReportSummaryMetrics:
      type: object
      additionalProperties: false
      required: [totalKWh, peakKWh, peakPeriodStart, peakPeriodEnd, estimatedKgCO2]
      properties:
        totalKWh:
          type: number
        peakKWh:
          type: number
        peakPeriodStart:
          type: string
          format: date-time
        peakPeriodEnd:
          type: string
          format: date-time
        estimatedKgCO2:
          type: number

    Recommendation:
      type: object
      additionalProperties: false
      required: [recommendationId, category, actionText, expectedImpact, priority]
      properties:
        recommendationId:
          type: string
        category:
          type: string
        actionText:
          type: string
        expectedImpact:
          type: string
        priority:
          type: string

    ContextNote:
      type: object
      additionalProperties: false
      required: [noteType, message]
      properties:
        noteType:
          type: string
        message:
          type: string

    DataCompletenessNote:
      type: object
      additionalProperties: false
      required: [missingSource, severity, message]
      properties:
        missingSource:
          type: string
        severity:
          type: string
        message:
          type: string
